name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            squashfs-tools \
            file

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm install

      - name: Build app
        run: npx tauri build

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Stage artifacts
        run: |
          mkdir -p artifacts
          V=${{ steps.version.outputs.version }}

          deb=$(find src-tauri/target/release/bundle/deb -name "*.deb" 2>/dev/null | head -1)
          rpm=$(find src-tauri/target/release/bundle/rpm -name "*.rpm" 2>/dev/null | head -1)
          ai=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" 2>/dev/null | head -1)

          [ -n "$deb" ] && cp "$deb" "artifacts/pdflinux_${V}_amd64.deb" && echo "deb: $deb"
          [ -n "$rpm" ] && cp "$rpm" "artifacts/pdflinux_${V}_x86_64.rpm" && echo "rpm: $rpm"
          [ -n "$ai"  ] && cp "$ai"  "artifacts/pdflinux_${V}_amd64.AppImage" && echo "AppImage: $ai"

          ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PDFLinux v${{ steps.version.outputs.version }}
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
